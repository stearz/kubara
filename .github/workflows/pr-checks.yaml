name: 'pr-checks'
on:
  push:
    branches:
      - 'main'
    paths:
      - 'go-binary/**'
  pull_request:
    branches:
      - 'main'
    paths:
      - 'go-binary/**'
  workflow_dispatch:

env:
  CODE_PATH: ${{ github.workspace }}/go-binary
  REPORT_DIR: ${{ github.workspace }}/reports
  RENDER_DIR: ${{ github.workspace }}/rendered
  OUTPUT_GENERATED_DIR: ${{ github.workspace }}/output-generated
  # renovate: datasource=github-releases depName=golangci/golangci-lint
  GOLANGCI_LINT_VERSION: "v2.11.4"
  # renovate: datasource=github-releases depName=securego/gosec
  GOSEC_VERSION: "v2.25.0"
  # renovate: datasource=github-releases depName=yannh/kubeconform
  KUBECONFORM_VERSION: "v0.7.0"
  # renovate: datasource=github-releases depName=terraform-linters/tflint
  TFLINT_VERSION: "v0.61.0"
  ARTIFACT_RETENTION_DAYS: "15"

permissions:
  contents: read
  packages: read
  security-events: write
  actions: read

jobs:
  go-static-analysis:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: ${{ env.CODE_PATH }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          sparse-checkout: go-binary

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go-binary/go.mod
          cache: true
          cache-dependency-path: go-binary/go.sum

      - name: Verify Go environment
        run: |
          set -euo pipefail
          echo "Go version: $(go version)"
          echo "GOPATH: $(go env GOPATH)"
          echo "GOCACHE: $(go env GOCACHE)"

          # Verify and tidy dependencies
          go mod verify
          go mod tidy -v

          # Check for any changes after tidy
          if ! git diff --exit-code go.mod go.sum; then
            echo "::error::go.mod or go.sum is not up to date. Run 'go mod tidy' locally."
            exit 1
          fi

      - name: Create report directory
        run: mkdir -p "${{ env.REPORT_DIR }}"
      - name: Check Go code formatting (gofmt)
        run: |
          set -euo pipefail
          echo "Checking code formatting with gofmt..."
          UNFORMATTED=$(gofmt -l . || true)
          if [ -n "$UNFORMATTED" ]; then
            echo "::error::The following files are not properly formatted:"
            echo "$UNFORMATTED" | tee "${{ env.REPORT_DIR }}/gofmt-unformatted-files.txt"
            echo "Generating diff output..."
            gofmt -d . | tee "${{ env.REPORT_DIR }}/gofmt-diff.txt"
            echo "::error::Please run 'gofmt -w .' locally to fix formatting."
            exit 1
          else
            echo "All Go files are properly formatted."
          fi

      - name: Go Vet
        run: |
          go vet ./... 2>&1 | tee "${{ env.REPORT_DIR }}/vet-results.txt"
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          working-directory: ${{ env.CODE_PATH }}
          args: |
            --output.text.path stdout \
            --output.html.path "${{ env.REPORT_DIR }}/golangci-results.html"

      - name: Cache gosec
        id: cache-gosec
        uses: actions/cache@v5
        with:
          path: ~/.local/bin/gosec
          key: ${{ runner.os }}-${{ runner.arch }}-gosec-${{ env.GOSEC_VERSION }}

      - name: Install gosec (if not cached)
        if: steps.cache-gosec.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          mkdir -p ~/.local/bin
          VERSION_NO_V="${{ env.GOSEC_VERSION }}"
          VERSION_NO_V="${VERSION_NO_V#v}"
          BASE_URL="https://github.com/securego/gosec/releases/download/${{ env.GOSEC_VERSION }}"
          ARCHIVE="gosec_${VERSION_NO_V}_linux_amd64.tar.gz"
          SHA256="$(curl -fsSL "$BASE_URL/gosec_${VERSION_NO_V}_checksums.txt" | awk -v file="$ARCHIVE" '$2 == file {print $1}')"
          TMP_ARCHIVE="$(mktemp)"

          if [ -z "$SHA256" ]; then
            echo "::error::Failed to resolve checksum for $ARCHIVE"
            exit 1
          fi

          curl -fsSL "$BASE_URL/$ARCHIVE" -o "$TMP_ARCHIVE"
          echo "$SHA256  $TMP_ARCHIVE" | sha256sum -c -
          tar xzf "$TMP_ARCHIVE" -C "$HOME/.local/bin" gosec
          rm -f "$TMP_ARCHIVE"
          chmod +x "$HOME/.local/bin/gosec"

      - name: Run gosec CLI
        if: always()
        run: |
          set -euo pipefail
          GOSEC_BIN="$HOME/.local/bin/gosec"

          if [ ! -x "$GOSEC_BIN" ]; then
            echo "::error::gosec binary not found at $GOSEC_BIN"
            ls -la "$HOME/.local/bin" || true
            exit 1
          fi

          # Verify installation
          "$GOSEC_BIN" --version
          echo "Current directory: $(pwd)"

          # Find Go packages
          echo "Finding Go packages..."
          SCAN_DIRS=$(find . -name "*.go" -type f \
            -not -path "./vendor/*" \
            -not -path "./.git/*" \
            -not -path "./pkg/mod/*" \
            -not -path "./.cache/*" \
            -print0 | xargs -0 dirname | sort -u)
          echo "Found directories to scan:"
          echo "$SCAN_DIRS" | sed 's/^/  - /'

          # Run gosec with severity filtering
          echo "Running gosec..."
          if [ -n "$SCAN_DIRS" ]; then
            # Generate SARIF report (always succeeds)
            "$GOSEC_BIN" -no-fail -fmt html -out "${{ env.REPORT_DIR }}/gosec-results.html" $SCAN_DIRS

            # Run with severity threshold - only fail on HIGH severity issues
            echo "Checking for HIGH severity issues..."
            if ! "$GOSEC_BIN" -severity high -confidence medium -fmt text $SCAN_DIRS; then
              echo "❌ HIGH severity security issues found!"
              exit 1
            else
              echo "✅ No HIGH severity security issues found"
            fi
          else
            echo "❌ No Go packages found!"
            exit 1
          fi

      - name: Upload static analysis results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: go-static-analysis-${{ github.run_attempt }}-${{ github.sha }}-${{ github.run_number }}
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}
          path: ${{ env.REPORT_DIR }}

  go-unit-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: ${{ env.CODE_PATH }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          sparse-checkout: go-binary

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go-binary/go.mod
          cache: true
          cache-dependency-path: go-binary/go.sum

      - name: Create report directory
        run: mkdir -p "${{ env.REPORT_DIR }}"
      - name: Run Go Unit Tests
        run: |
          set -euo pipefail
          echo "Running unit tests..."
          go test \
            -race \
            -timeout=10m \
            -coverprofile="${{ env.REPORT_DIR }}/coverage.out" \
            -covermode=atomic \
            -json \
            ./... > "${{ env.REPORT_DIR }}/go-test-results.json"

          # Generate Coverage report
          echo "Test coverage summary:"
          go tool cover -func="${{ env.REPORT_DIR }}/coverage.out" | tail -1
          go tool cover -html="${{ env.REPORT_DIR }}/coverage.out" -o "${{ env.REPORT_DIR }}/coverage.html"

          # Extract coverage percentage
          COVERAGE=$(go tool cover -func="${{ env.REPORT_DIR }}/coverage.out" | tail -1 | awk '{print $3}')
          echo "Test coverage: $COVERAGE"

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: go-test-results-${{ github.run_attempt }}-${{ github.sha }}-${{ github.run_number }}
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}
          path: ${{ env.REPORT_DIR }}

  run-kubara-init-and-generate:
    needs: [go-static-analysis, go-unit-tests]
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: ${{ github.workspace }}
    outputs:
      success: ${{ steps.commit.outputs.success }}
    env:
      # .env updates (must match go-binary/assets/envmap/EnvMap)
      KUBARA_PROJECT_NAME: "kubara"
      KUBARA_PROJECT_STAGE: "tst"
      KUBARA_DOCKERCONFIG_BASE64: "000000"
      KUBARA_ARGOCD_WIZARD_ACCOUNT_PASSWORD: "000000"
      KUBARA_ARGOCD_HELM_REPO_USERNAME: "git"
      KUBARA_ARGOCD_HELM_REPO_PASSWORD: "000000"
      KUBARA_ARGOCD_HELM_REPO_URL: "https://kubara.io/kubara.git"
      KUBARA_ARGOCD_GIT_HTTPS_URL: "https://kubara.io/kubara.git"
      KUBARA_ARGOCD_GIT_PAT_OR_PASSWORD: "000000"
      KUBARA_ARGOCD_GIT_USERNAME: "git"
      KUBARA_DOMAIN_NAME: "stackit.run"

      # config.yaml updates
      KUBARA_STACKIT_PROJECT_ID: "00000000-0000-0000-0000-000000000000"
      KUBARA_TERRAFORM_PROVIDER: "stackit"
      KUBARA_CLUSTER_TYPE: "controlplane"
      KUBARA_SSO_ORG: "Kubara"
      KUBARA_SSO_TEAM: "Test"
      KUBARA_KUBERNETES_TYPE: "ske"
      KUBARA_KUBERNETES_VERSION: "1.35.0"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go-binary/go.mod
          cache: true
          cache-dependency-path: go-binary/go.sum

      - name: Create output directory
        run: |
          echo "output dir: ${{ env.OUTPUT_GENERATED_DIR }}"
          mkdir -p "${{ env.OUTPUT_GENERATED_DIR }}"

      - name: kubara init --prep
        run: |
          set -euo pipefail
          cd go-binary
          go run main.go --work-dir "${{ env.OUTPUT_GENERATED_DIR }}" init --prep

      - name: Update .env (strict template mode)
        run: |
          set -euo pipefail
          .scripts/kubara-env-update.sh "${{ env.OUTPUT_GENERATED_DIR }}/.env"

      - name: kubara init
        run: |
          set -euo pipefail
          cd go-binary
          go run main.go --work-dir "${{ env.OUTPUT_GENERATED_DIR }}" init

      - name: Update config.yaml (strict mode)
        run: |
          set -euo pipefail
          .scripts/kubara-config-update.sh "${{ env.OUTPUT_GENERATED_DIR }}/config.yaml"

      - name: Generate kubara artifacts
        run: |
          cd go-binary
          go run main.go --work-dir "${{ env.OUTPUT_GENERATED_DIR }}" generate

      - name: Upload generated helm and terraform files
        uses: actions/upload-artifact@v7
        with:
          name: kubara-generated-files-${{ github.run_attempt }}-${{ github.sha }}-${{ github.run_number }}
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}
          path: ${{ env.OUTPUT_GENERATED_DIR }}

  helm-checks:
    needs: run-kubara-init-and-generate
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Download generated kubara artifacts
        uses: actions/download-artifact@v8
        with:
          name: kubara-generated-files-${{ github.run_attempt }}-${{ github.sha }}-${{ github.run_number }}

      - name: Verify preinstalled Helm
        run: |
          set -euo pipefail
          helm version --short

      - name: Cache kubeconform
        id: cache-kubeconform
        uses: actions/cache@v5
        with:
          path: ~/.local/bin/kubeconform
          key: tools-kubeconform-${{ env.KUBECONFORM_VERSION }}-${{ runner.os }}-${{ runner.arch }}

      - name: Install kubeconform (if missing)
        run: |
          set -euo pipefail
          mkdir -p ~/.local/bin
          
          if ! [ -x "$HOME/.local/bin/kubeconform" ]; then
            KUBECONFORM_ARCHIVE="kubeconform-linux-amd64.tar.gz"
            KUBECONFORM_BASE_URL="https://github.com/yannh/kubeconform/releases/download/${{ env.KUBECONFORM_VERSION }}"
            KUBECONFORM_SHA256="$(curl -fsSL "$KUBECONFORM_BASE_URL/CHECKSUMS" | awk '/  kubeconform-linux-amd64.tar.gz$/ {print $1}')"
            TMP_ARCHIVE="$(mktemp)"

            curl -fsSL "$KUBECONFORM_BASE_URL/$KUBECONFORM_ARCHIVE" -o "$TMP_ARCHIVE"
            echo "$KUBECONFORM_SHA256  $TMP_ARCHIVE" | sha256sum -c -
            tar xzf "$TMP_ARCHIVE" -C "$HOME/.local/bin" kubeconform
            rm -f "$TMP_ARCHIVE"
            chmod +x "$HOME/.local/bin/kubeconform"
          fi
          
          kubeconform -v

      - name: Lint, render and validate Helm charts
        run: |
          set -uo pipefail
          export PATH="$HOME/.local/bin:$PATH"
          KUBE_VERSION=$(yq -r '.clusters[] | select(.name == "kubara") | .terraform.kubernetesVersion' config.yaml)
          KUBE_PROMETHEUS_STATUS=$(yq -r '.clusters[] | select(.name == "kubara") | .services.kubePrometheusStack.status // "disabled"' config.yaml)
          HELM_TEMPLATE_API_ARGS=()
          if [[ "$KUBE_PROMETHEUS_STATUS" == "enabled" ]]; then
            HELM_TEMPLATE_API_ARGS+=(--api-versions "monitoring.coreos.com/v1")
            echo "ℹ️ kubePrometheusStack is enabled; adding Helm API version: monitoring.coreos.com/v1"
          else
            echo "ℹ️ kubePrometheusStack is not enabled; rendering without monitoring.coreos.com/v1 API override"
          fi
          mkdir -p "${{ env.REPORT_DIR }}/helm" "${{ env.RENDER_DIR }}"
          MANAGED_BASE="managed-service-catalog/helm"
          CUSTOMER_BASE="customer-service-catalog/helm/kubara"
          echo "🔍 Scanning managed Helm charts..."
          FAILED_CHARTS=()
          for CHART in $(find "$MANAGED_BASE" -mindepth 1 -maxdepth 1 -type d -printf '%f\n' | sort); do
            echo ""
            echo "::group::Processing chart: $CHART"
            MANAGED_CHART_PATH="$MANAGED_BASE/$CHART"
            CUSTOMER_VALUES_FILE="$CUSTOMER_BASE/$CHART/values.yaml"
            OUT_DIR="${{ env.RENDER_DIR }}/$CHART"
            mkdir -p "$OUT_DIR"
            if [[ ! -f "$MANAGED_CHART_PATH/Chart.yaml" ]]; then
              echo "::warning::Missing Chart.yaml for $CHART - skipping"
              echo "::endgroup::"
              continue
            fi
            CHART_TYPE=$(yq '.type // "application"' "$MANAGED_CHART_PATH/Chart.yaml")
            if [[ "$CHART_TYPE" == "library" ]]; then
              echo "::notice::Skipping library chart '$CHART'"
              echo "::endgroup::"
              continue
            fi
            echo "📦 Running 'helm dependency update'..."
            if ! helm dependency update "$MANAGED_CHART_PATH"; then
              echo "::error file=$MANAGED_CHART_PATH/Chart.yaml::helm dependency update failed for $CHART"
              FAILED_CHARTS+=("$CHART")
              echo "::endgroup::"
              continue
            fi
            echo "🧪 Running helm lint..."
            if [[ -f "$CUSTOMER_VALUES_FILE" ]]; then
              if ! helm lint --quiet "$MANAGED_CHART_PATH" -f "$CUSTOMER_VALUES_FILE" \
                | tee "${{ env.REPORT_DIR }}/helm/${CHART}-lint.log"; then
                echo "::error file=$CUSTOMER_VALUES_FILE::helm lint failed for $CHART"
                FAILED_CHARTS+=("$CHART")
              fi
              echo "📄 Rendering chart with overlay values"
              helm template --kube-version "$KUBE_VERSION" "${HELM_TEMPLATE_API_ARGS[@]}" --include-crds "$CHART" "$MANAGED_CHART_PATH" -f "$CUSTOMER_VALUES_FILE" > "$OUT_DIR/render.yaml"
            else
              if ! helm lint --quiet "$MANAGED_CHART_PATH" \
                | tee "${{ env.REPORT_DIR }}/helm/${CHART}-lint.log"; then
                echo "::error file=$MANAGED_CHART_PATH/Chart.yaml::helm lint failed for $CHART"
                FAILED_CHARTS+=("$CHART")
              fi
              echo "📄 Rendering chart with default values"
              helm template "${HELM_TEMPLATE_API_ARGS[@]}" --include-crds "$CHART" "$MANAGED_CHART_PATH" > "$OUT_DIR/render.yaml"
            fi
            # CRD status is server-populated and may contain null placeholders in chart output.
            # Remove it before schema validation to avoid false negatives in kubeconform.
            yq eval -i 'select(.kind == "CustomResourceDefinition") |= del(.status)' "$OUT_DIR/render.yaml"
            echo "🔎 Validating rendered manifests with kubeconform"
            if ! kubeconform -output pretty -strict -kubernetes-version="$KUBE_VERSION" \
                -schema-location default \
                -schema-location https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json \
                -schema-location https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/{{.NormalizedKubernetesVersion}}/{{.ResourceKind}}.json \
                -schema-location https://json.schemastore.org/{{.ResourceKind}}.json  \
                "$OUT_DIR/render.yaml" \
                | tee "${{ env.REPORT_DIR }}/helm/${CHART}-kubeconform.log"; then
              echo "::error file=$OUT_DIR/render.yaml::kubeconform failed for $CHART"
              FAILED_CHARTS+=("$CHART")
            fi
            echo "✅ Finished processing: $CHART"
            echo "::endgroup::"
          done
          echo ""
          echo "────────────────────────────────────"
          if [[ "${#FAILED_CHARTS[@]}" -gt 0 ]]; then
            echo "::error::❌ The following Helm charts failed:"
            for FAIL in "${FAILED_CHARTS[@]}"; do
              echo "::error::   - $FAIL"
            done
            exit 1
          else
            echo "✅ All Helm charts passed validation."
          fi

      - name: Upload Helm validation results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: helm-validation-${{ github.run_attempt }}-${{ github.sha }}-${{ github.run_number }}
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}
          path: |
            ${{ env.REPORT_DIR }}/helm/
            ${{ env.RENDER_DIR }}/

  terraform-checks:
    needs: run-kubara-init-and-generate
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Download generated kubara artifacts
        uses: actions/download-artifact@v8
        with:
          name: kubara-generated-files-${{ github.run_attempt }}-${{ github.sha }}-${{ github.run_number }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.9.3

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v6
        with:
          tflint_version: ${{ env.TFLINT_VERSION }}

      - name: Validate Terraform modules and environments
        run: |
          set -eo pipefail
          mkdir -p "${{ env.REPORT_DIR }}/terraform"
          echo ""
          echo "📦 Starting Terraform static analysis"
          echo "──────────────────────────────────────────────"
          FAILED_DIRS=()
          TARGET_DIRS=(
            "managed-service-catalog/terraform/modules"
            "customer-service-catalog/terraform/kubara"
          )
          for BASE_DIR in "${TARGET_DIRS[@]}"; do
            [[ -d "$BASE_DIR" ]] || continue
            for DIR in "$BASE_DIR"/*; do
              [[ -d "$DIR" ]] || continue
              NAME="$(basename "$(dirname "$DIR")")-$(basename "$DIR")"
              LOG="${{ env.REPORT_DIR }}/terraform/${NAME}.log"
              echo "────────────────────────────────────────────"
              echo "🔍 Checking: $DIR"
              echo "📝 Report: $LOG"
              echo "────────────────────────────────────────────"
              echo "::group::Terraform check: $NAME"
              echo "📂 Directory: $DIR" | tee "$LOG"
              echo "📐 terraform fmt -check -diff" | tee -a "$LOG"
              if ! terraform fmt -check -diff "$DIR" | tee -a "$LOG"; then
                echo "::error file=$DIR::terraform fmt failed"
                FAILED_DIRS+=("$DIR")
              fi
              echo "📋 terraform init (backend=false)" | tee -a "$LOG"
              if ! terraform -chdir="$DIR" init -backend=false -input=false >> "$LOG" 2>&1; then
                echo "::error file=$DIR::terraform init failed"
                FAILED_DIRS+=("$DIR")
              fi
              echo "🧪 terraform validate" | tee -a "$LOG"
              if ! terraform -chdir="$DIR" validate | tee -a "$LOG"; then
                echo "::error file=$DIR::terraform validate failed"
                FAILED_DIRS+=("$DIR")
              fi
              echo "🔎 tflint" | tee -a "$LOG"
              if ! tflint --chdir "$DIR" | tee -a "$LOG"; then
                echo "::error file=$DIR::tflint failed"
                FAILED_DIRS+=("$DIR")
              fi
              echo "✅ Done: $DIR" | tee -a "$LOG"
              echo "::endgroup::"
            done
          done
          echo ""
          echo "──────────────────────────────────────────────"
          if [[ "${#FAILED_DIRS[@]}" -gt 0 ]]; then
            echo "::error::❌ The following Terraform directories failed:"
            for FAIL in "${FAILED_DIRS[@]}"; do
              echo "::error::$FAIL"
            done
            exit 1
          else
            echo "✅ All Terraform checks passed."
          fi

      - name: Upload Terraform validation results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: terraform-validation-${{ github.run_attempt }}-${{ github.sha }}-${{ github.run_number }}
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}
          path: ${{ env.REPORT_DIR }}/terraform
