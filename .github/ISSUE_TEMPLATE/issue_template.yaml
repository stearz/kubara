---
name: Bug or Feature Request
description: Report a bug, suggest a feature, or ask a question related to Kubara
title: "[Issue]: "
labels: ["triage"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ## 📝 Summary
        Please read first <a target="_blank" href="https://github.com/kubara-io/kubara/blob/main/CONTRIBUTING.md">how to contribute to Kubara</a>.
        Briefly describe the issue or request. What is the problem, question, or improvement you're raising?

  - type: textarea
    id: summary
    attributes:
      label: Summary
      placeholder: "Kubara does not install correctly when using custom CRDs..."
    validations:
      required: true

  - type: dropdown
    id: type-of-issue
    attributes:
      label: 🧩 Type of Issue
      options:
        - 🐛 Bug
        - ✨ Feature request
        - ❓ Question or clarification
        - 🧪 Improvement or refactor
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: 🔍 Description
      description: Describe the issue in detail. What did you expect, and what happened instead?
      placeholder: |
        - Expected: Kubara installs platform components successfully.
        - Actual: Helm deployment hangs indefinitely.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 🧪 Steps to Reproduce (for bugs)
      description: List clear steps to reproduce the issue.
      placeholder: |
        1. Run `kubara init`
        2. Apply config X
        3. Observe error Y

  - type: textarea
    id: environment
    attributes:
      label: 💻 Environment
      description: Provide relevant environment details.
      placeholder: |
        - Kubara version: v1.4.2
        - Kubernetes version: 1.28 (EKS)
        - Helm version: 3.13
        - Platform: kind
        - OS/Arch: Ubuntu 22.04 / amd64

  - type: checkboxes
    id: checklist
    attributes:
      label: ✅ Checklist
      options:
        - label: I have searched existing issues
          required: true
        - label: I am using the latest version of Kubara
        - label: The issue is reproducible
        - label: This is not a duplicate

  - type: input
    id: related
    attributes:
      label: 🔗 Related Issues / References
      placeholder: "# 42, # 123"

  - type: textarea
    id: additional
    attributes:
      label: 📎 Additional Context / Logs
      description: Paste logs, screenshots, or links to related docs here.
